spring:
  application:
    name: ai-cost-intelligence-platform
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/acip}
    username: ${DATABASE_USERNAME:acip}
    password: ${DATABASE_PASSWORD:acip}
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

acip:
  work-tracking:
    provider: ${WORK_TRACKING_PROVIDER:mock}
  source-control:
    provider: ${SOURCE_CONTROL_PROVIDER:mock}
    organization: ${SOURCE_CONTROL_ORGANIZATION:}
  demo-data:
    enabled: ${DEMO_DATA_ENABLED:false}
    usage-event-count: ${DEMO_USAGE_EVENT_COUNT:2000}
  openai:
    provider: ${LLM_PROVIDER:OPENAI}
    api-key: ${OPENAI_API_KEY:}
    require-api-key: ${OPENAI_REQUIRE_API_KEY:true}
    chat-completions-url: ${OPENAI_CHAT_COMPLETIONS_URL:https://api.openai.com/v1/chat/completions}
    connect-timeout: 5s
    read-timeout: 60s
  jira:
    base-url: ${JIRA_BASE_URL:}
    email: ${JIRA_EMAIL:}
    api-token: ${JIRA_API_TOKEN:}
    default-jql: ${JIRA_DEFAULT_JQL:project is not EMPTY ORDER BY updated DESC}
    page-size: ${JIRA_PAGE_SIZE:50}
    epic-link-field: ${JIRA_EPIC_LINK_FIELD:customfield_10014}
    work-type-field: ${JIRA_WORK_TYPE_FIELD:customfield_10015}
